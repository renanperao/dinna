services:
  postgres:
    image: postgres:16-alpine
    container_name: nexomenu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexomenu
      POSTGRES_PASSWORD: nexomenu
      POSTGRES_DB: nexomenu
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - nexomenu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexomenu -d nexomenu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexomenu_pg_data:
